services:
  - type: web
    name: dataflow-api
    runtime: python
    repo: https://github.com/BarujaFe1/DataFlow
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
